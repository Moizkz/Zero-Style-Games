<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="Stylesheet" href="Style.css">
    <title>Tic-tac-toe</title>
</head>
<body>
    <h1 class="title">Tic-tac-toe</h1>
    <div class="cc">
    <div class="players">
    <!-- Player 1 -->
    <div class="p1">
        <h1 class="p1_name">X</h1>
        <br>
        <h1 class="p1_score">00</h1>
    </div>
      <button class="reset">Reset</button>
    <!-- player 2 -->
    <div class="p2">
        <h1 class="p2_name">O</h1>
        <br>
        <h1 class="p2_score">00</h1>
    </div>
    </div>
    <!-- main box(game) -->
     <div class="box">
        <Button id="0"class="btn"></Button>
        <Button id="1"class="btn"></Button>
        <Button id="2"class="btn"></Button>
        <Button id="3"class="btn"></Button>
        <Button id="4"class="btn"></Button>
        <Button id="5"class="btn"></Button>
        <Button id="6"class="btn"></Button>
        <Button id="7"class="btn"></Button>
        <Button id="8"class="btn"></Button>
     </div>
     <!-- Reset game -->
      <h1 class="winner">Winner is </h1>
    </div>
      <div class="container">
    <button class = "bt" id ="player">PVP</button>
    <br>
    <button class="bt" id="Computer"> computer</button>
    </div>
      <script src="script.js"></script>
</body>
</html>
